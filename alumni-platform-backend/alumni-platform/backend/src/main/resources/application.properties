# ============================================================
# Alumni Platform - Application Configuration
# ============================================================

server.port=8080
spring.application.name=alumni-platform

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/alumni_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=alumni_platform_super_secret_key_must_be_at_least_256_bits_long_for_hs256
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Mail (configure SMTP for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.alumni=DEBUG
logging.level.org.springframework.security=INFO
